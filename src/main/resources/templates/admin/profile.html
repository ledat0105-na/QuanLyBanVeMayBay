<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::div.admin-wrapper})}">
<head>
    <title>Trang Cá Nhân</title>
</head>
<body>
<div class="admin-wrapper">
<div class="container-fluid py-4">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark m-0"><i class="fas fa-id-badge text-primary me-2"></i>Trang Cá Nhân</h2>
            <small class="text-muted">Quản lý thông tin và bảo mật tài khoản</small>
        </div>
    </div>

    <div class="row g-4">

        <!-- LEFT: Avatar Card -->
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm rounded-4 text-center p-4 h-100">
                <div class="mb-4 mt-2">
                    <div th:if="${user.avatarUrl != null}" class="position-relative d-inline-block">
                        <img th:src="@{${user.avatarUrl}}" class="rounded-circle shadow-sm"
                             style="width: 120px; height: 120px; object-fit: cover; border: 4px solid #e9ecef;">
                    </div>
                    <div th:if="${user.avatarUrl == null}"
                         class="bg-primary text-white d-inline-flex justify-content-center align-items-center rounded-circle shadow-sm"
                         style="width: 120px; height: 120px; font-size: 42px;">
                        <i class="fas fa-user-shield"></i>
                    </div>
                </div>

                <h4 class="fw-bold mb-1" th:text="${user.fullName}">Tên người dùng</h4>
                <p class="text-muted mb-1 small" th:text="${user.email}">email@example.com</p>
                <span class="badge bg-primary rounded-pill px-3 py-1 mb-4" th:text="${user.role != null ? user.role.roleName : 'ADMIN'}">ADMIN</span>

                <div class="d-grid gap-2 text-start">
                    <a th:href="@{/admin/profile}" class="btn btn-primary rounded-pill px-4">
                        <i class="fas fa-id-card me-2"></i>Thông Tin Cá Nhân
                    </a>
                    <a th:href="@{/admin/report}" class="btn btn-outline-primary rounded-pill px-4">
                        <i class="fas fa-chart-line me-2"></i>Trang Quản Trị
                    </a>
                    <a th:href="@{/logout}" class="btn btn-outline-danger rounded-pill px-4 mt-2">
                        <i class="fas fa-sign-out-alt me-2"></i>Đăng Xuất
                    </a>
                </div>

                <hr class="my-4">
                <div class="text-start small text-muted">
                    <div class="mb-2"><i class="fas fa-phone text-primary me-2"></i><span th:text="${user.phone ?: 'Chưa cập nhật'}">0xxx</span></div>
                    <div class="mb-2"><i class="fas fa-user text-primary me-2"></i><span th:text="${user.username}">username</span></div>
                    <div><i class="fas fa-circle text-success me-2" style="font-size: 8px;"></i>Đang hoạt động</div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Forms -->
        <div class="col-lg-9">

            <!-- Update Info Card -->
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                <h4 class="mb-4"><i class="fas fa-user-edit text-primary me-2"></i>Cập Nhật Thông Tin</h4>

                <div th:if="${successDetails}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successDetails}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorDetails}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorDetails}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/admin/profile/update}" method="post" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Tài khoản đăng nhập</label>
                            <input type="text" class="form-control bg-light" th:value="${user.username}" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Địa chỉ Email</label>
                            <input type="email" class="form-control bg-light" th:value="${user.email}" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Họ và Tên</label>
                            <input type="text" class="form-control" name="fullName" th:value="${user.fullName}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input type="text" class="form-control" name="phone" th:value="${user.phone}">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Ảnh đại diện mới</label>
                            <input type="file" name="avatarFile" class="form-control" accept="image/*">
                        </div>
                        <div class="col-12 text-end mt-2">
                            <button type="submit" class="btn btn-primary rounded-pill px-5 py-2">
                                <i class="fas fa-save me-2"></i>Lưu Thay Đổi
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Change Password Card -->
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h4 class="mb-4"><i class="fas fa-shield-alt text-warning me-2"></i>Đổi Mật Khẩu</h4>

                <div th:if="${successSecurity}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successSecurity}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorSecurity}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorSecurity}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/admin/profile/change-password}" method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                            <input type="password" class="form-control" name="oldPassword" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Mật khẩu mới</label>
                            <input type="password" class="form-control" name="newPassword"
                                   pattern="^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*()_+\-=\[\]{};':|,.<>\/?]).{8,}$"
                                   title="Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, số và ký tự đặc biệt"
                                   required minlength="8">
                            <div class="form-text text-muted mt-1">
                                <i class="fas fa-info-circle me-1 text-primary"></i>
                                Ít nhất <strong>8 ký tự</strong>, gồm:
                                <span class="badge bg-secondary ms-1">A-Z chữ hoa</span>
                                <span class="badge bg-secondary ms-1">0-9 số</span>
                                <span class="badge bg-secondary ms-1">!@#$... đặc biệt</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                            <input type="password" class="form-control" name="confirmPassword" required minlength="8">
                        </div>
                        <div class="col-12 text-end mt-2">
                            <button type="submit" class="btn btn-warning text-white rounded-pill px-5 py-2">
                                <i class="fas fa-key me-2"></i>Cập Nhật Mật Khẩu
                            </button>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
</div>
</body>
</html>
