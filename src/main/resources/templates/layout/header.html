<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <th:block th:fragment="head">
    <meta charset="utf-8">
    <title th:text="${
           requestURI == '/' ? 'Trang Chủ - SkyTravel' :
           requestURI == '/about' ? 'Giới Thiệu - SkyTravel' :
           requestURI == '/services' ? 'Dịch Vụ - SkyTravel' :
           requestURI == '/projects' ? 'Điểm Đến - SkyTravel' :
           requestURI == '/contact' ? 'Liên Hệ - SkyTravel' :
           requestURI == '/login' ? 'Đăng Nhập - SkyTravel' :
           requestURI == '/register' ? 'Đăng Ký - SkyTravel' :
           requestURI == '/forgot-password' ? 'Quên Mật Khẩu - SkyTravel' :
           requestURI == '/reset-password' ? 'Đặt Lại Mật Khẩu - SkyTravel' :
           (requestURI != null and requestURI.startsWith('/admin')) ? 'Trang Quản Trị - SkyTravel' :
           (requestURI != null and requestURI.startsWith('/profile')) ? 'Hồ Sơ Của Tôi - SkyTravel' :
           (requestURI != null and requestURI.startsWith('/flights')) ? 'Kết Quả Tìm Kiếm - SkyTravel' :
           (requestURI != null and requestURI.startsWith('/booking')) ? 'Mua Vé - SkyTravel' :
           'SkyTravel - Hệ Thống Đặt Máy Bay'
       }">SkyTravel</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    
    <link th:href="@{/images/logo.png}" rel="icon" type="image/png">

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Space+Grotesk&display=swap" rel="stylesheet">

    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    
    <link th:href="@{/lib/animate/animate.min.css}" rel="stylesheet">
    <link th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">

    
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <!-- Responsive stylesheet for all devices -->
    <link th:href="@{/css/responsive.css}" rel="stylesheet">
    
    <!-- CSRF Token Meta Tags -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  </th:block>
</html>
