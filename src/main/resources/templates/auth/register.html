<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
</head>
<body>
<th:block th:replace="~{layout/navbar :: navbar}"></th:block>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Đăng ký tài khoản</h2>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
                            <ul class="mb-0">
                                <li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
                            </ul>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <input class="form-control" th:field="*{username}" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="regPassword" th:field="*{password}"
                                       required/>
                                <button class="btn btn-outline-secondary bg-white border-start-0" type="button" onclick="togglePwd('regPassword','eyeReg')">
                                    <i class="fas fa-eye" id="eyeReg"></i>
                                </button>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            <div id="pwdError" class="small mt-1 text-danger"></div>
                            <div class="form-text text-muted mt-1">
                                <i class="fas fa-info-circle me-1 text-primary"></i>
                                Mật khẩu phải có <strong>ít nhất 8 ký tự</strong>, bao gồm:
                                <span class="badge bg-secondary ms-1">A-Z chữ hoa</span>
                                <span class="badge bg-secondary ms-1">0-9 số</span>
                                <span class="badge bg-secondary ms-1">!@#$... ký tự đặc biệt</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="regConfirmPassword" th:field="*{confirmPassword}" required/>
                                <button class="btn btn-outline-secondary bg-white border-start-0" type="button" onclick="togglePwd('regConfirmPassword','eyeConfirm')">
                                    <i class="fas fa-eye" id="eyeConfirm"></i>
                                </button>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                            <div id="confirmPwdError" class="small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Họ tên</label>
                            <input class="form-control" th:field="*{fullName}" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input class="form-control" th:field="*{phone}" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Đăng ký</button>

                        <div class="mt-3 text-center">
                            <a th:href="@{/login}" class="text-decoration-none">Quay lại đăng nhập</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{layout/footer :: footer}"></th:block>
<script>
    // Toggle show/hide password
    function togglePwd(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // Password strength rules
    const rules = [
        { test: v => v.length >= 8,            msg: 'Ít nhất 8 ký tự' },
        { test: v => /[A-Z]/.test(v),          msg: 'Ít nhất 1 chữ in hoa (A-Z)' },
        { test: v => /[0-9]/.test(v),          msg: 'Ít nhất 1 chữ số (0-9)' },
        { test: v => /[!@#$%^&*()_+\-=\[\]{};':|,.<>\/?]/.test(v), msg: 'Ít nhất 1 ký tự đặc biệt (!@#$...)' },
    ];

    function validatePwd(inputId, errorDivId) {
        const val = document.getElementById(inputId).value;
        const errorDiv = document.getElementById(errorDivId);
        const failed = rules.filter(r => !r.test(val));
        if (val.length === 0) {
            errorDiv.innerHTML = '';
            document.getElementById(inputId).classList.remove('is-invalid', 'is-valid');
            return;
        }
        if (failed.length > 0) {
            errorDiv.innerHTML = '<ul class="mb-0 ps-3">' + failed.map(r => `<li>${r.msg}</li>`).join('') + '</ul>';
            document.getElementById(inputId).classList.add('is-invalid');
            document.getElementById(inputId).classList.remove('is-valid');
        } else {
            errorDiv.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Mật khẩu hợp lệ!</span>';
            document.getElementById(inputId).classList.add('is-valid');
            document.getElementById(inputId).classList.remove('is-invalid');
        }
    }

    document.getElementById('regPassword').addEventListener('input', () => validatePwd('regPassword', 'pwdError'));
    document.getElementById('regConfirmPassword').addEventListener('input', () => {
        const pw = document.getElementById('regPassword').value;
        const cpw = document.getElementById('regConfirmPassword').value;
        const div = document.getElementById('confirmPwdError');
        if (cpw.length === 0) { div.innerHTML = ''; return; }
        if (pw !== cpw) {
            div.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Mật khẩu không khớp!</span>';
            document.getElementById('regConfirmPassword').classList.add('is-invalid');
            document.getElementById('regConfirmPassword').classList.remove('is-valid');
        } else {
            div.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Mật khẩu khớp!</span>';
            document.getElementById('regConfirmPassword').classList.add('is-valid');
            document.getElementById('regConfirmPassword').classList.remove('is-invalid');
        }
    });

    // Block submit if password is invalid
    document.querySelector('form').addEventListener('submit', function(e) {
        const pw = document.getElementById('regPassword').value;
        const failed = rules.filter(r => !r.test(pw));
        if (failed.length > 0) {
            e.preventDefault();
            validatePwd('regPassword', 'pwdError');
            document.getElementById('regPassword').focus();
        }
        const cpw = document.getElementById('regConfirmPassword').value;
        if (pw !== cpw) {
            e.preventDefault();
            document.getElementById('confirmPwdError').innerHTML =
                '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Mật khẩu không khớp!</span>';
            document.getElementById('regConfirmPassword').classList.add('is-invalid');
        }
    });
</script>
</body>
</html>
