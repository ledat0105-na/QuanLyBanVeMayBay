<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        .data-table th {
            white-space: nowrap;
        }
        .admin-sidebar {
            width: 250px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            transition: all 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            z-index: 1000;
        }
        /* Custom scrollbar for sidebar */
        .admin-sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .admin-sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .admin-sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .admin-sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        .admin-sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            font-size: 1.05rem;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
        }
        .admin-sidebar .nav-link:hover, .admin-sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
            border-left-color: #3498db;
        }
        .admin-sidebar .nav-link i {
            width: 25px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.2rem;
        }
        .admin-content {
            margin-left: 250px;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .admin-topbar {
            background-color: white;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="admin-sidebar shadow-lg">
    <div class="p-4 text-center border-bottom border-light mb-3" style="border-color: rgba(248, 249, 250, 0.1) !important;">
        <img th:src="@{/images/logo.png}" alt="SkyTravel Logo" style="height: 50px;" class="mb-2">
        <h3 class="text-white m-0 fw-bold">SkyTravel</h3>
        <p class="text-info small mb-0 mt-1">Admin Dashboard</p>
    </div>
    
    <div class="nav flex-column sidebar-nav-links">
        <a th:href="@{/admin/report}" class="nav-link"><i class="fas fa-chart-line"></i>Thống Kê</a>
        <a th:href="@{/admin/bookings}" class="nav-link"><i class="fas fa-book"></i>Quản Lý Đặt Vé</a>
        
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/users}" class="nav-link"><i class="fas fa-users"></i>Người Dùng</a>
            <a th:href="@{/admin/notifications}" class="nav-link"><i class="fas fa-bullhorn"></i>Gửi Thông Báo</a>
            <a th:href="@{/admin/airlines}" class="nav-link"><i class="fas fa-plane"></i>Hãng Bay</a>
            <a th:href="@{/admin/airports}" class="nav-link"><i class="fas fa-building"></i>Sân Bay</a>
            <a th:href="@{/admin/flights}" class="nav-link"><i class="fas fa-calendar-alt"></i>Chuyến Bay</a>
            <a th:href="@{/admin/promotions}" class="nav-link"><i class="fas fa-ticket-alt"></i>Khuyến Mãi</a>
            
            <!-- Thiet ke tong quan group -->
            <div class="nav-link-group">
                <a th:href="@{/admin/visual-editor#manage-carousel}" target="_blank" class="nav-link text-warning fw-bold">
                    <i class="fas fa-paint-roller"></i>Thiết Kế Tổng Quan
                </a>
            </div>
            <a th:href="@{/admin/contacts}" class="nav-link position-relative">
                <i class="fas fa-envelope"></i>Hộp Thư
                <span th:if="${unreadContactCount != null and unreadContactCount > 0}"
                      class="position-absolute top-50 end-0 translate-middle-y badge rounded-pill bg-danger me-3"
                      style="font-size: 0.6rem;" th:text="${unreadContactCount}"></span>
            </a>
        </div>
        
        <!-- Private Staff Profile -->
        <div class="px-4 mt-4 mb-2 text-muted small fw-bold text-uppercase">Cá Nhân</div>
        <a th:href="@{/admin/profile}" class="nav-link"><i class="fas fa-id-badge"></i>Trang Cá Nhân</a>
    </div>
</div>

<!-- Main Content -->
<div class="admin-content">
    <!-- Topbar -->
    <div class="admin-topbar">
        <div>
            <h5 class="m-0 text-dark fw-bold">Hệ Thống Quản Trị</h5>
        </div>
        <div class="d-flex align-items-center">
            <div class="me-3 text-end d-none d-md-block">
                <div class="fw-bold text-dark text-capitalize" sec:authentication="name">Admin</div>
                <small class="text-success fw-bold"><i class="fas fa-circle me-1" style="font-size: 8px;"></i>Active</small>
            </div>

            <!-- Notification Bell for Admin/Staff -->
            <div class="dropdown me-3 position-relative">
                <a href="#" class="btn btn-light rounded-circle shadow-sm d-flex align-items-center justify-content-center position-relative"
                   style="width: 40px; height: 40px;" data-bs-toggle="dropdown" title="Thông Báo">
                    <i class="fas fa-bell text-primary"></i>
                    <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          style="font-size: 0.55rem;" th:text="${unreadNotificationCount}"></span>
                </a>
                <div class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-3 mt-2" style="width: 340px; max-height: 420px; overflow-y: auto;">
                    <div class="p-3 border-bottom bg-primary text-white rounded-top d-flex justify-content-between align-items-center">
                        <h6 class="m-0 fw-bold"><i class="fas fa-bell me-2"></i>Thông Báo</h6>
                        <a th:href="@{/admin/notifications}" class="text-white small"><u>Quản lý</u></a>
                    </div>
                    <div th:if="${userNotifications == null or #lists.isEmpty(userNotifications)}" class="p-4 text-center text-muted">
                        <i class="far fa-bell-slash fa-2x mb-2"></i>
                        <p class="mb-0 small">Chưa có thông báo nào</p>
                    </div>
                    <div th:unless="${userNotifications == null or #lists.isEmpty(userNotifications)}">
                        <a href="#" th:each="notif : ${userNotifications}"
                           th:attr="onclick=|markNotifRead(${notif.id})|"
                           class="dropdown-item py-3 border-bottom text-wrap"
                           th:classappend="${!notif.isRead} ? 'bg-light fw-bold' : ''">
                            <div class="d-flex align-items-start gap-2">
                                <i class="fas mt-1 text-primary" th:classappend="${notif.isRead} ? 'fa-envelope-open' : 'fa-envelope'"></i>
                                <div>
                                    <div class="small fw-bold" th:text="${notif.title}">Tiêu đề</div>
                                    <div class="text-muted" style="font-size:0.78rem;" th:text="${#strings.abbreviate(notif.message,60)}">Nội dung</div>
                                    <div class="text-primary" style="font-size:0.7rem;" th:text="${#temporals.format(notif.createdAt, 'dd/MM HH:mm')}">Thời gian</div>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <a th:href="@{/admin/profile}" class="btn btn-light rounded-circle shadow-sm me-3 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Trang Cá Nhân">
                <i class="fas fa-user-shield text-primary"></i>
            </a>
            <a th:href="@{/logout}" class="btn btn-danger btn-sm rounded-pill px-3 py-2 fw-bold"><i class="fas fa-sign-out-alt me-1"></i>Đăng Xuất</a>
        </div>
    </div>

    <!-- Page Content -->
    <div class="p-4">
        <th:block th:replace="${content}"></th:block>
    </div>
    
</div>

<!-- JavaScript Libraries -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<!-- SweetAlert2 Global Override -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
    .swal2-container {
        z-index: 30000 !important;
    }
</style>
<script>
    window.alert = function(message) {
        Swal.fire({
            title: 'Thông báo',
            text: message,
            icon: 'warning',
            confirmButtonColor: '#3085d6',
            confirmButtonText: 'Đóng'
        });
    };
</script>

<script>
    function markNotifRead(id) {
        fetch('/api/notifications/read/' + id, { method: 'POST' })
        .then(res => { if (res.ok) window.location.reload(); });
    }
</script>

<script>
    $(document).ready(function() {
        // Initialize DataTables
        $('.data-table').DataTable({
            "pageLength": 10,
            "lengthMenu": [10, 20, 30, 50],
            "language": {
                "lengthMenu": "Hiển thị _MENU_ dòng / trang",
                "zeroRecords": "Không tìm thấy dữ liệu phù hợp",
                "info": "_START_ - _END_ / _TOTAL_",
                "infoEmpty": "0 / 0",
                "infoFiltered": "(đã lọc từ _MAX_ dòng)",
                "search": "Lọc nhanh:",
                "paginate": {
                    "first": "Đầu",
                    "last": "Cuối",
                    "next": "Tiếp",
                    "previous": "Trước"
                }
            }
        });
        var currentUrl = window.location.pathname;
        $('.sidebar-nav-links a.nav-link').each(function() {
            var href = $(this).attr('href');
            if (currentUrl.startsWith(href)) {
                // Highlight the active link
                $(this).addClass('text-warning fw-bold');
            }
        });
    });
</script>
</body>
</html>
