<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
</head>
<body class="bg-light">

<th:block th:replace="~{layout/navbar :: navbar}"></th:block>

<!-- Stepper Navigation -->
<style>
    .stepper-glow {
        background-color: #127a7b !important;
        color: white !important;
        box-shadow: 0 0 15px rgba(18, 122, 123, 0.6);
        border: none !important;
    }
    .stepper-text-glow {
        color: #127a7b !important;
    }
    .stepper-inactive {
        background-color: #e2e8e8 !important;
        color: #798787 !important;
        border: none !important;
    }
    .stepper-text-inactive {
        color: #798787 !important;
    }
    .stepper-line-container {
        position: absolute;
        top: 20px;
        left: 16.666%;
        width: 66.666%;
        height: 3px;
        background-color: #e2e8e8;
        z-index: 0;
    }
    .stepper-line-progress {
        height: 100%;
        background-color: #127a7b;
        transition: width 0.3s ease;
    }
    .stepper-circle {
        position: relative;
        z-index: 1;
        width: 40px; 
        height: 40px; 
        line-height: 40px;
        display: inline-block;
        border-radius: 50%;
        font-size: 1.25rem;
        font-weight: bold;
    }
</style>
<div class="container-fluid bg-white py-3 mb-4 shadow-sm border-bottom">
    <div class="container">
        <div class="row text-center position-relative">
            <div class="stepper-line-container">
                <div class="stepper-line-progress" style="width: 50%;"></div>
            </div>
            <div class="col-4">
                <span class="stepper-circle stepper-glow"><i class="fas fa-check"></i></span>
                <p class="mt-2 fw-bold mb-0 stepper-text-glow">Hành khách</p>
            </div>
            <div class="col-4">
                <span class="stepper-circle stepper-glow">2</span>
                <p class="mt-2 fw-bold mb-0 stepper-text-glow">Dịch vụ & Chọn vé</p>
            </div>
            <div class="col-4">
                <span class="stepper-circle stepper-inactive">3</span>
                <p class="mt-2 fw-bold mb-0 stepper-text-inactive">Thanh toán</p>
            </div>
        </div>
    </div>
</div>

<main class="container mb-5">
    <div class="row">
        <!-- Main Form Content -->
        <div class="col-lg-8 mb-4">
            <form th:action="@{/booking/step2}" th:object="${req}" method="post" id="step2Form">
                
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2 rounded-top-4">
                        <h4 class="fw-bold mb-0"><i class="fas fa-suitcase-rolling text-primary me-2"></i>Hành lý ký gửi</h4>
                        <p class="text-muted mt-2">Mỗi hành khách đã bao gồm 7kg xách tay. Chọn thêm hành lý ký gửi nếu cần.</p>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Chọn gói hành lý (Áp dụng chung)</label>
                                <select th:field="*{selectedBaggageId}" class="form-select border-primary py-2" id="baggageSelect">
                                    <option value="" data-price="0">Không thêm hành lý ký gửi (0đ)</option>
                                    <option th:each="bg : ${baggageOptions}" th:value="${bg.id}" th:text="${bg.name + ' - ' + #numbers.formatDecimal(bg.price, 0, 'COMMA', 0, 'POINT') + ' đ'}" th:data-price="${bg.price}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2 rounded-top-4">
                        <h4 class="fw-bold mb-0"><i class="fas fa-ticket-alt text-primary me-2"></i>Mã khuyến mãi</h4>
                    </div>
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nhập mã ưu đãi (Tùy chọn)</label>
                                <input type="text" th:field="*{promotionCode}" class="form-control text-uppercase border-primary py-2" placeholder="VD: SUMMER2024" id="promoInput">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4 border-top pt-4">
                    <a th:href="@{/booking/step1(flightId=${req.flight.id}, passengers=${req.numberOfPassengers})}" class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-bold"><i class="fas fa-arrow-left me-2"></i>Quay lại</a>
                    <button type="submit" class="btn btn-primary px-5 py-2 rounded-pill shadow-sm fs-5 fw-bold">Xác nhận Đặt vé <i class="fas fa-arrow-right ms-2"></i></button>
                </div>
            </form>
        </div>

        <!-- Sidebar Summary -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 20px;">
                <div class="card-header bg-primary text-white pt-4 pb-3 rounded-top-4">
                    <h5 class="fw-bold mb-0">Chi tiết thanh toán</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Giá vé cơ bản (x<span th:text="${req.numberOfPassengers}"></span>)</span>
                        <span class="fw-bold" id="basePriceTotal" th:text="${#numbers.formatDecimal(req.flight.basePrice * req.numberOfPassengers, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Hành lý ký gửi</span>
                        <span class="fw-bold text-success" id="baggagePriceDisplay">+0 đ</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold fs-5">Tổng cộng</span>
                        <h3 class="fw-bold text-primary mb-0" id="finalTotalDisplay" th:text="${#numbers.formatDecimal(req.flight.basePrice * req.numberOfPassengers, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{layout/footer :: footer}"></th:block>

<script th:inline="javascript">
    const baseTotalStr = /*[[${req.flight.basePrice * req.numberOfPassengers}]]*/ 0;
    const baseTotal = parseFloat(baseTotalStr);
    
    document.getElementById('baggageSelect').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const extraPrice = parseFloat(selectedOption.getAttribute('data-price') || 0);
        
        document.getElementById('baggagePriceDisplay').innerText = '+' + extraPrice.toLocaleString('vi-VN') + ' đ';
        document.getElementById('finalTotalDisplay').innerText = (baseTotal + extraPrice).toLocaleString('vi-VN') + ' đ';
    });
</script>
</body>
</html>
