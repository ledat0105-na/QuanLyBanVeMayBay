<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
</head>
<body>
<th:block th:replace="~{layout/navbar :: navbar}"></th:block>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Đặt lại mật khẩu</h2>

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                    <div class="alert alert-info" role="alert" th:if="${email != null}">
                        Mã OTP sẽ được gửi tới: <b th:text="${email}"></b>
                    </div>

                    <form th:action="@{/reset-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" th:value="${email}" required autofocus/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mã OTP</label>
                            <input class="form-control" name="otpCode" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" name="newPassword" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" class="form-control" name="confirmPassword" required/>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Xác nhận đặt lại</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a th:href="@{/forgot-password}" class="text-decoration-none">Gửi lại OTP</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{layout/footer :: footer}"></th:block>
</body>
</html>
