<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
</head>
<body>
<th:block th:replace="~{layout/navbar :: navbar}"></th:block>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Quên mật khẩu</h2>

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                    <form th:action="@{/forgot-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required autofocus/>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Gửi mã OTP</button>

                        <div class="mt-3 text-center">
                            <a th:href="@{/login}" class="text-decoration-none">Quay lại đăng nhập</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{layout/footer :: footer}"></th:block>
</body>
</html>
