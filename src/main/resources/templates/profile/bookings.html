<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
</head>
<body class="bg-light">

<th:block th:replace="~{layout/navbar :: navbar}"></th:block>

<div id="img-HEADER_PROFILE_BOOKINGS" class="container-fluid bg-primary py-5 mb-5 hero-header"
     th:classappend="${isEditorMode} ? 'editable-img' : ''" 
     th:onclick="${isEditorMode} ? |openEditor('HEADER_PROFILE_BOOKINGS')| : null"
     th:style="|background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('${pageBanners['HEADER_PROFILE_BOOKINGS'] != null ? pageBanners['HEADER_PROFILE_BOOKINGS'].imageUrl : 'https://i.pinimg.com/1200x/5e/ad/ea/5eadea4b8fcaa0114432e87f543c9b25.jpg'}') center center/cover no-repeat;|">
    <div class="container py-5">
        <div class="row justify-content-center py-5">
            <div class="col-lg-10 pt-lg-5 mt-lg-5 text-center">
                <h1 class="display-3 text-white animated slideInDown">Vé Của Tôi</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center">
                        <li class="breadcrumb-item"><a th:href="@{/}">Trang Chủ</a></li>
                        <li class="breadcrumb-item text-white active" aria-current="page">Vé Của Tôi</li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-lg-12">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm border-0 mb-4" role="alert">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 shadow-sm border-0 mb-4" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-2 rounded-top-4">
                    <h4 class="fw-bold mb-0"><i class="fas fa-ticket-alt text-primary me-2"></i>Lịch sử đặt vé</h4>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Mã Đặt Chỗ</th>
                                    <th>Chuyến Bay</th>
                                    <th>Ngày Đi</th>
                                    <th>Trạng Thái</th>
                                    <th>Tổng Tiền</th>
                                    <th class="pe-4 text-center">Hành Động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="booking : ${bookings}">
                                    <td class="ps-4 fw-bold text-primary" th:text="${booking.bookingCode}"></td>
                                    <td>
                                        <span class="fw-bold" th:text="${booking.flight.departureAirport.code}"></span>
                                        <i class="fas fa-arrow-right mx-1 text-muted"></i>
                                        <span class="fw-bold" th:text="${booking.flight.arrivalAirport.code}"></span>
                                        <br>
                                        <small class="text-muted" th:text="${booking.flight.airline.name} + ' - ' + ${booking.flight.flightNumber}"></small>
                                    </td>
                                    <td th:text="${#temporals.format(booking.flight.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td>
                                        <span th:if="${booking.bookingStatus == 'WAITING_PAYMENT'}" class="badge bg-warning text-dark"><i class="fas fa-clock me-1"></i>Chờ thanh toán</span>
                                        <span th:if="${booking.bookingStatus == 'CONFIRMED'}" class="badge bg-success"><i class="fas fa-check-circle me-1"></i>Đã xác nhận</span>
                                        <span th:if="${booking.bookingStatus == 'CANCELLED'}" class="badge bg-danger"><i class="fas fa-times-circle me-1"></i>Đã hủy</span>
                                        <span th:if="${booking.bookingStatus == 'REFUNDED'}" class="badge bg-secondary"><i class="fas fa-undo me-1"></i>Đã hoàn tiền</span>
                                        <span th:if="${booking.bookingStatus == 'PENDING'}" class="badge bg-info text-dark"><i class="fas fa-hourglass-half me-1"></i>Chờ duyệt</span>
                                    </td>
                                    <td class="fw-bold text-success" th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    <td class="pe-4 text-center">
                                        <a th:if="${booking.bookingStatus == 'WAITING_PAYMENT'}" th:href="@{/booking/step3(bookingId=${booking.id})}" class="btn btn-sm btn-primary rounded-pill px-3 mb-1">Thanh toán</a>
                                        
                                        <!-- Check-in Actions -->
                                        <th:block th:if="${booking.bookingStatus == 'CONFIRMED'}">
                                            <span th:if="${booking.checkedIn}" class="badge bg-success rounded-pill px-3 py-2 mb-1"><i class="fas fa-check-circle me-1"></i>Đã Check-in</span>
                                            
                                            <form th:if="${!booking.checkedIn and booking.checkInAllowed}" th:action="@{/profile/bookings/{id}/checkin(id=${booking.id})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-success rounded-pill px-3 mb-1 fw-bold">Check-in</button>
                                            </form>
                                            
                                            <span th:if="${!booking.checkedIn and booking.checkInNotOpenYet}" class="badge bg-light text-secondary border rounded-pill px-3 py-2 mb-1" 
                                                  th:title="'Check-in mở lúc: ' + ${#temporals.format(booking.flight.departureTime.minusHours(23), 'dd/MM/yyyy HH:mm')}">
                                                <i class="far fa-clock me-1"></i>Chưa mở check-in
                                            </span>
                                            
                                            <span th:if="${!booking.checkedIn and booking.checkInClosed}" class="badge bg-danger text-white rounded-pill px-3 py-2 mb-1">
                                                <i class="fas fa-ban me-1"></i>Đóng check-in
                                            </span>
                                        </th:block>

                                        <a th:href="@{/booking/success(bookingId=${booking.id})}" class="btn btn-sm btn-outline-secondary rounded-pill px-3 mb-1">Chi tiết</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(bookings)}">
                                    <td colspan="6" class="text-center py-5">
                                        <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
                                        <h5 class="text-muted mb-0">Bạn chưa có đặt chỗ nào.</h5>
                                        <a th:href="@{/}" class="btn btn-primary rounded-pill mt-3 px-4">Đặt vé ngay</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:if="${isEditorMode}" th:replace="~{layout/visual-editor :: editor}"></th:block>
<th:block th:replace="~{layout/footer :: footer}"></th:block>
</body>
</html>
