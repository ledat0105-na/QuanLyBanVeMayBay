<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
</head>
<body>
<th:block th:replace="~{layout/navbar :: navbar}"></th:block>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Đăng nhập</h2>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert" id="loginErrorAlert">
                        Tên đăng nhập hoặc mật khẩu không đúng.
                    </div>
                    
                    <!-- Locked Account Notification Script -->
                    <script th:if="${param.error != null and session['SPRING_SECURITY_LAST_EXCEPTION'] != null}">
                        document.addEventListener('DOMContentLoaded', function() {
                            const errorMsg = "[[${session['SPRING_SECURITY_LAST_EXCEPTION'].message}]]";
                            // Check if the exception message indicates a locked account
                            if (errorMsg.toLowerCase().includes('locked') || errorMsg.toLowerCase().includes('khóa')) {
                                // Hide the default alert
                                const alert = document.getElementById('loginErrorAlert');
                                if (alert) alert.style.display = 'none';
                                
                                const adminPhone = "[[${footerPhone != null ? footerPhone : '1900 1234'}]]";
                                
                                Swal.fire({
                                    title: 'Tài khoản bị khóa!',
                                    html: `<p class="mb-3">Tài khoản của bạn đã bị tạm khóa vì lý do an ninh.</p>
                                           <p class="mb-0 fw-bold text-danger">Vui lòng liên hệ Admin để được hỗ trợ: <br> <span class="fs-4">${adminPhone}</span></p>`,
                                    icon: 'error',
                                    confirmButtonColor: '#0d6efd',
                                    confirmButtonText: '<i class="fas fa-redo me-1"></i>Thử lại',
                                    allowOutsideClick: false,
                                    customClass: { popup: 'shadow-lg rounded-4' }
                                }).then((result) => {
                                    if (result.isConfirmed) {
                                        window.location.href = '/login';
                                    }
                                });
                            }
                        });
                    </script>

                    <div th:if="${param.registered}" class="alert alert-success" role="alert">
                        Đăng ký thành công. Vui lòng đăng nhập.
                    </div>
                    <div th:if="${param.reset}" class="alert alert-success" role="alert">
                        Đặt lại mật khẩu thành công. Vui lòng đăng nhập.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập / Email / SĐT</label>
                            <input type="text" class="form-control" name="username" placeholder="Nhập tên đăng nhập, email hoặc số điện thoại" required autofocus/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="passwordField" name="password" required/>
                                <button class="btn btn-outline-secondary bg-white border-start-0" type="button" id="togglePassword">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <script>
                            document.getElementById('togglePassword').addEventListener('click', function (e) {
                                const passwordInput = document.getElementById('passwordField');
                                const eyeIcon = document.getElementById('eyeIcon');
                                if (passwordInput.type === 'password') {
                                    passwordInput.type = 'text';
                                    eyeIcon.classList.remove('fa-eye');
                                    eyeIcon.classList.add('fa-eye-slash');
                                } else {
                                    passwordInput.type = 'password';
                                    eyeIcon.classList.remove('fa-eye-slash');
                                    eyeIcon.classList.add('fa-eye');
                                }
                            });
                        </script>

                        <button class="btn btn-primary w-100" type="submit">Đăng nhập</button>

                        <div class="mt-3 d-flex justify-content-between">
                            <a th:href="@{/forgot-password}" class="small text-decoration-none">Quên mật khẩu?</a>
                            <a th:href="@{/register}" class="small text-decoration-none">Đăng ký tài khoản</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{layout/footer :: footer}"></th:block>
</body>
</html>
