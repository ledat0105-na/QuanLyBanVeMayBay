                                <th>Trạng thái</th><th class="text-center">Thao tác</th>

                                </td>
                                <td th:text="${#temporals.format(f.departureTime, 'dd/MM/yyyy HH:mm')}"></td>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
// ============ PRICE FORMAT ============
function formatVND(numStr) {
    let val = String(numStr).replace(/[^0-9]/g, '');
    if (!val) return '';
    // Format with commas (0,000,000) as requested
    return val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.price-input').forEach(function(input) {
        // Init if value exists
        if (input.value) {
            input.value = formatVND(input.value);
        }

        input.addEventListener('input', function(e) {
            let val = this.value.replace(/[^0-9]/g, '');
            if (val) {
                this.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            } else {
                this.value = '';
            }
        });

        // Strip formatting before submit
        let form = input.closest('form');
        if (form) {
            form.addEventListener('submit', function() {
                input.value = input.value.replace(/[^0-9]/g, '');
            });
        }
    });
});

// ============ VALIDATION ============
// Airline rules: departure must be >= now + 24 hours, airports distinct
function validateForm(depAirId, arrAirId, depTimeId, arrTimeId) {
    const depAir = document.getElementById(depAirId);
    const arrAir = document.getElementById(arrAirId);
    
    if (depAir && arrAir && depAir.value && arrAir.value) {
        if (depAir.value === arrAir.value) {
            Swal.fire({icon: 'error', title: 'Lỗi chặng bay', text: 'Sân bay khởi hành và sân bay hạ cánh KHÔNG được trùng nhau!'});
            return false;
        }
    }

    const dep = document.getElementById(depTimeId);
    const arr = document.getElementById(arrTimeId);
    
    // Đồng bộ hóa thủ công nếu người dùng đang gõ dở vào ô hiển thị
    if (dep && dep._flatpickr && dep._flatpickr.altInput) dep._flatpickr.setDate(dep._flatpickr.altInput.value, false);
    if (arr && arr._flatpickr && arr._flatpickr.altInput) arr._flatpickr.setDate(arr._flatpickr.altInput.value, false);

    let depVal = dep ? dep.value : '';
    let arrVal = arr ? arr.value : '';

    const now = new Date();
    const minDep = new Date(now.getTime() + 24 * 3600000); 

    dep.classList.remove('is-invalid');
    arr.classList.remove('is-invalid');

    if (!depVal) { 
        Swal.fire({icon: 'warning', title: 'Thông báo', text: 'Vui lòng chọn thời gian khởi hành!'});
        if (dep._flatpickr && dep._flatpickr.altInput) dep._flatpickr.altInput.classList.add('is-invalid');
        else dep.classList.add('is-invalid'); 
        return false; 
    }
    
    const depDate = new Date(depVal);
    if (isNaN(depDate.getTime())) {
        Swal.fire({icon: 'error', title: 'Lỗi', text: 'Định dạng ngày khởi hành không hợp lệ!'});
        return false;
    }

    if (depDate < now) {
        Swal.fire({icon: 'error', title: 'Lỗi', text: 'Không được thêm chuyến bay trong quá khứ!'});
        dep.classList.add('is-invalid'); 
        return false;
    }

    if (!arrVal) { 
        Swal.fire({icon: 'warning', title: 'Thông báo', text: 'Vui lòng chọn thời gian hạ cánh!'});
        if (arr._flatpickr && arr._flatpickr.altInput) arr._flatpickr.altInput.classList.add('is-invalid');
        else arr.classList.add('is-invalid'); 
        return false; 
    }
    
    const arrDate = new Date(arrVal);
    if (isNaN(arrDate.getTime())) {
        Swal.fire({icon: 'error', title: 'Lỗi', text: 'Định dạng ngày hạ cánh không hợp lệ!'});
        return false;
    }
    const minFlight = 30 * 60000; // 30 min flight minimum
    if (arrDate <= depDate) {
        Swal.fire({icon: 'error', title: 'Lỗi thời gian', text: 'Thời gian hạ cánh phải diễn ra SAU thời gian khởi hành!'});
        arr.classList.add('is-invalid'); 
        return false;
    } 
    
    if ((arrDate - depDate) < minFlight) {
        Swal.fire({icon: 'error', title: 'Thời gian bay quá ngắn', text: 'Chuyến bay tối thiểu phải kéo dài ít nhất 30 phút!'});
        arr.classList.add('is-invalid'); 
        return false;
    }
    
    return true;
}

function validateCreateFlight() {
    // strip price formatting before submit
    const p = document.getElementById('createPrice');
    if (p) p.value = p.value.replace(/[^0-9]/g, '');
    return validateForm('createDepAir', 'createArrAir', 'createDep', 'createArr');
}

function validateFlight(fid) {
    const p = document.getElementById('editPrice' + fid);
    if (p) p.value = p.value.replace(/[^0-9]/g, '');
    return validateForm('editDepAir' + fid, 'editArrAir' + fid, 'editDep' + fid, 'editArr' + fid);
}

// ============ FLATPICKR INIT ============
document.addEventListener('DOMContentLoaded', function() {
    const locale = {
        firstDayOfWeek: 1,
        weekdays: { shorthand: ['CN','T2','T3','T4','T5','T6','T7'], longhand: ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'] },
        months: { shorthand: ['Th1','Th2','Th3','Th4','Th5','Th6','Th7','Th8','Th9','Th10','Th11','Th12'], longhand: ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'] }
    };
    const fpBase = { 
        enableTime: true, 
        dateFormat: 'Y-m-d\\TH:i', 
        altInput: true, 
        altFormat: 'd/m/Y H:i', 
        time_24hr: true, 
        locale: locale, 
        allowInput: true,
        minuteIncrement: 5,
        parseDate: function(datestr, format) {
            if (!datestr) return null;
            if (datestr instanceof Date) return datestr;
            if (typeof datestr !== 'string') return new Date(datestr);
            const parts = datestr.trim().split(/[\s/:\-T]+/);
            if (parts.length >= 5) {
                if (parts[0].length === 4) {
                    const year = parseInt(parts[0], 10);
                    const month = parseInt(parts[1], 10) - 1;
                    const day = parseInt(parts[2], 10);
                    const hour = parseInt(parts[3], 10);
                    const minute = parseInt(parts[4], 10);
                    return new Date(year, month, day, hour, minute);
                } else {
                    const day = parseInt(parts[0], 10);
                    const month = parseInt(parts[1], 10) - 1;
                    const year = parseInt(parts[2], 10);
                    const hour = parseInt(parts[3], 10);
                    const minute = parseInt(parts[4], 10);
                    return new Date(year, month, day, hour, minute);
                }
            }
            return null;
        }
    };

    const fpDep = flatpickr('#createDep', Object.assign({}, fpBase, {
        minDate: new Date(),
        onChange: function(sd) { if (sd[0]) fpArr.set('minDate', new Date(sd[0].getTime() + 30*60000)); }
    }));
    const fpArr = flatpickr('#createArr', Object.assign({}, fpBase, {
        minDate: new Date()
    }));

    document.querySelectorAll('.flatpickr-dt').forEach(function(el) {
        if (el.id === 'createDep' || el.id === 'createArr') return;
        const val = el.getAttribute('data-val') || '';
        flatpickr(el, Object.assign({}, fpBase, { defaultDate: val || null }));
    });
});
