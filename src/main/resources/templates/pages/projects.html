<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/header :: head}"></th:block>
</head>
<body class="bg-light">

<th:block th:replace="~{layout/navbar :: navbar}"></th:block>

<!-- Page Header Start -->
<div class="container-fluid page-header py-5 mb-5" style="background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1517400508447-f8dd518b86db?q=80&w=2070&auto=format&fit=crop'); background-position: center;">
    <div class="container py-5 text-center">
        <h1 class="display-3 text-white fw-bold mb-3 animated slideInDown">Điểm Đến Đặc Trưng</h1>
        <nav aria-label="breadcrumb animated slideInDown">
            <ol class="breadcrumb justify-content-center mb-0">
                <li class="breadcrumb-item"><a class="text-white" href="/">Trang Chủ</a></li>
                <li class="breadcrumb-item text-primary active" aria-current="page">Thư Viện Ảnh</li>
            </ol>
        </nav>
    </div>
</div>
<!-- Page Header End -->

<!-- Banners Gallery (Reuse Home Gallery Style) -->
<div class="container-fluid py-5">
    <div class="row g-4 justify-content-center px-lg-5" th:with="destBanners=${banners.?[position == 'DESTINATION']}">
        <div th:each="bn : ${destBanners}" class="col-lg-4 col-md-6 wow fadeInUp flight-banner-card">
            <div class="position-relative overflow-hidden rounded-4 shadow-sm" style="height: 380px;">
                <img class="img-fluid w-100 h-100" style="object-fit: cover; transition: transform 0.5s ease;" 
                     th:src="@{${bn.imageUrl}}" alt="Destination">
                <div class="position-absolute bottom-0 start-0 w-100 p-4" 
                     style="background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);">
                    <h3 class="text-white fw-bold mb-0 shadow-text" th:text="${bn.title}"></h3>
                </div>
                <!-- Hover overlay -->
                <div class="position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center btn-overlay p-4 text-center" 
                     style="background: rgba(13, 107, 104, 0.85); opacity: 0; transition: opacity 0.3s;">
                    <h5 class="text-warning mb-3 fw-bold animated fadeInDown" th:text="${bn.subtitle}"></h5>
                    <a href="/" class="btn btn-light rounded-pill px-4 py-2 fw-bold shadow-lg text-primary animated fadeInUp">Đặt Chuyến Bay Ngay</a>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(destBanners)}" class="col-12 text-center text-muted">
            <p>Nội dung đang được cập nhật.</p>
        </div>
    </div>
    <style>
        .flight-banner-card:hover img { transform: scale(1.1); }
        .flight-banner-card:hover .btn-overlay { opacity: 1 !important; }
        .shadow-text { text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</div>

<th:block th:replace="~{layout/footer :: footer}"></th:block>
</body>
</html>
